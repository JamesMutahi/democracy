name: Deploy Flutter Web

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ vars.BASE_URL }}
      WEBSOCKET_URL: ${{ vars.WEBSOCKET_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      AGORA_ID: ${{ secrets.AGORA_ID }}
      FAKE_USERNAME: ${{ secrets.FAKE_USERNAME }}
      FAKE_PASSWORD: ${{ secrets.FAKE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true

      - name: Print environment variables (Debug)
        run: |
          echo "=== GitHub Variables ==="
          echo "BASE_URL       = ${BASE_URL}"
          echo "WEBSOCKET_URL  = ${WEBSOCKET_URL}"
          echo "SENTRY_DSN     = ${SENTRY_DSN:0:10}... (hidden)"
          echo "AGORA_ID       = ${AGORA_ID:0:8}... (hidden)"
          echo "=== End Debug ==="

      - name: Create dart-defines JSON file
        run: |
          cat > env.json << EOF
          {
            "BASE_URL": "${BASE_URL}",
            "WEBSOCKET_URL": "${WEBSOCKET_URL}",
            "SENTRY_DSN": "${SENTRY_DSN}",
            "AGORA_ID": "${AGORA_ID}",
            "FAKE_USERNAME": "${FAKE_USERNAME}",
            "FAKE_PASSWORD": "${FAKE_PASSWORD}"
          }
          EOF
          
          echo "=== Generated env.json ==="
          cat env.json
          echo "=== End env.json ==="

      - run: flutter pub get

      - name: Deploy to GitHub Pages
        uses: bluefireteam/flutter-gh-pages@v9
        with:
          baseHref: /
          customDomain: peopleofkenya.com
          webRenderer: auto
          customArgs: --dart-define-from-file=env.json